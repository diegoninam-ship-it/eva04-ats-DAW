server:
  port: 8081

spring:
  application:
    name: vacante-service

  datasource:
    url: jdbc:mysql://localhost:3306/bd_vacante_dev
    username: root
    password: Root2026!

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

mensaje:
  bienvenida: "Módulo de Gestión de Vacantes activo"