server:
  port: 8083

spring:
  application:
    name: usuario-service

  datasource:
    url: jdbc:mysql://localhost:3306/bd_usuario_dev
    username: root
    password: Root2026!

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

mensaje:
  bienvenida: "Bienvenido al Sistema de Reclutamiento ATS"